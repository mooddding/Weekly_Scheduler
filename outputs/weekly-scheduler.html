<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weekly Pipeline Scheduler</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #fff;
      --ink: #17202a;
      --muted: #667485;
      --line: #d9dee7;
      --line-soft: #edf1f6;
      --header: #f2f5f9;
      --accent: #1b7f79;
      --accent-dark: #0f5f5a;
      --danger: #d95757;
      --live: #e34242;
      --shadow: 0 10px 28px rgba(23, 32, 42, 0.1);
      --day-w: 86px;
      --hour-w: 168px;
      --row-h: 96px;
      --row-pad: 8px;
      --lane-gap: 5px;
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    button, input, select { font: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 22px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .title h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .help-wrap {
      position: relative;
      width: max-content;
      flex: 0 0 auto;
    }

    .help-btn {
      width: 18px;
      height: 18px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: help;
    }

    .help-tooltip {
      position: absolute;
      left: 0;
      top: 26px;
      z-index: 80;
      width: 360px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .help-wrap:hover .help-tooltip,
    .help-wrap:focus-within .help-tooltip {
      opacity: 1;
      transform: translateY(0);
    }

    .app-title-text {
      display: inline-block;
      max-width: min(100%, 520px);
      cursor: text;
    }

    .app-title-input {
      display: none;
      width: min(100%, 520px);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 1px 6px;
      margin: -1px -6px 0;
      font: inherit;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 800;
      color: inherit;
      background: #fff;
    }

    .app-title-input:focus {
      outline: none;
    }

    .title.editing .app-title-text {
      display: none;
    }

    .title.editing .help-wrap {
      display: none;
    }

    .title.editing .app-title-input {
      display: inline-block;
    }

    .actions, .filters, .legend {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .actions { justify-content: flex-end; }
    .legend { justify-content: flex-end; gap: 14px; color: var(--muted); font-size: 12px; }

    .week-status {
      min-width: 104px;
      height: 28px;
      padding: 0 10px;
      border-radius: 7px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: #f7f9fc;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .week-status.changed {
      color: var(--accent-dark);
      background: rgba(27, 127, 121, 0.1);
      border-color: rgba(27, 127, 121, 0.24);
    }

    .grid.week-changed .day-head,
    .grid.week-changed .hour-head {
      animation: weekPulse 420ms ease;
    }

    @keyframes weekPulse {
      0% { background: #e9f6f4; }
      100% { background: var(--header); }
    }

    .icon-btn, .text-btn {
      height: 36px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 7px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
    }

    .icon-btn { width: 38px; padding: 0; }
    .text-btn { padding: 0 12px; font-weight: 650; font-size: 13px; }
    .text-btn.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    .text-btn.danger { color: var(--danger); }
    .icon-btn:hover, .text-btn:hover { border-color: var(--accent); }
    .text-btn.primary:hover { border-color: var(--accent-dark); background: var(--accent-dark); }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 12px 22px;
      background: #fbfcfe;
      border-bottom: 1px solid var(--line);
    }

    .live-strip {
      margin: 14px 22px 0;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 12px;
      box-shadow: 0 6px 16px rgba(23, 32, 42, 0.06);
      overflow: hidden;
    }

    .live-badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--live);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.04em;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--live);
      box-shadow: 0 0 0 0 rgba(227, 66, 66, 0.45);
      animation: livePulse 1.35s ease-out infinite;
    }

    .live-items {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }

    .live-empty {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .live-item {
      flex: 0 0 auto;
      max-width: 260px;
      border: 1px solid color-mix(in srgb, var(--live), #fff 72%);
      border-radius: 999px;
      background: color-mix(in srgb, var(--live), #fff 92%);
      color: #8f2323;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @keyframes livePulse {
      100% { box-shadow: 0 0 0 9px rgba(227, 66, 66, 0); }
    }

    .field {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    select, input[type="text"] {
      height: 34px;
      min-width: 150px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
      outline: none;
    }

    input[type="text"] { width: 230px; }
    textarea {
      width: 100%;
      min-height: 96px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 10px;
      resize: vertical;
      outline: none;
    }
    select:focus, input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(27, 127, 121, 0.14); }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--dot);
      display: inline-block;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .platform-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .scheduler-shell {
      overflow: hidden;
      padding: 16px 22px 22px;
      position: relative;
    }

    .scroll-hint {
      position: absolute;
      top: 16px;
      bottom: 22px;
      width: 30px;
      z-index: 90;
      pointer-events: none;
      opacity: 0;
      transition: opacity 140ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scroll-hint.visible {
      opacity: 1;
    }

    .scroll-hint.left {
      left: calc(22px + var(--day-w));
      background: linear-gradient(90deg, rgba(246, 247, 249, 0.58), rgba(246, 247, 249, 0));
    }

    .scroll-hint.right {
      right: 22px;
      background: linear-gradient(270deg, rgba(246, 247, 249, 0.58), rgba(246, 247, 249, 0));
    }

    .scroll-hint span {
      width: 22px;
      height: 22px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.72);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 8px rgba(23, 32, 42, 0.08);
    }

    .scroll-hint span::before {
      content: "";
      width: 7px;
      height: 7px;
      border-top: 2px solid var(--muted);
      border-right: 2px solid var(--muted);
    }

    .scroll-hint.left span::before {
      transform: translateX(1px) rotate(-135deg);
    }

    .scroll-hint.right span::before {
      transform: translateX(-1px) rotate(45deg);
    }

    .scheduler {
      height: calc(100vh - 150px);
      min-height: 520px;
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: relative;
    }

    .grid {
      width: max-content;
      min-width: 100%;
      display: grid;
      grid-template-columns: var(--day-w) repeat(24, var(--hour-w));
      position: relative;
    }

    .corner, .hour-head, .day-head {
      background: var(--header);
      border-bottom: 1px solid var(--line);
    }

    .corner {
      position: sticky;
      left: 0;
      top: 0;
      z-index: 40;
      height: 54px;
      border-right: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 14px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .hour-head {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--line);
      font-size: 12px;
      font-weight: 750;
      color: #384759;
    }

    .day-head {
      position: sticky;
      left: 0;
      z-index: 30;
      height: var(--row-h);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      padding: 0 14px;
    }

    .day-head strong { font-size: 18px; line-height: 1; }
    .day-head span { color: var(--muted); font-size: 12px; font-weight: 650; }

    .timeline-row {
      grid-column: 2 / span 24;
      position: relative;
      height: var(--row-h);
      border-bottom: 1px solid var(--line);
      background:
        repeating-linear-gradient(
          to right,
          #fff 0,
          #fff calc(var(--hour-w) - 1px),
          var(--line-soft) calc(var(--hour-w) - 1px),
          var(--line-soft) var(--hour-w)
        );
      user-select: none;
    }

    .timeline-row.weekend {
      background:
        repeating-linear-gradient(
          to right,
          #fbfcfd 0,
          #fbfcfd calc(var(--hour-w) - 1px),
          var(--line-soft) calc(var(--hour-w) - 1px),
          var(--line-soft) var(--hour-w)
        );
    }

    .timeline-row.dragging { cursor: ew-resize; }

    .day-head.today,
    .timeline-row.today {
      background:
        repeating-linear-gradient(
          to right,
          rgba(27, 127, 121, 0.08) 0,
          rgba(27, 127, 121, 0.08) calc(var(--hour-w) - 1px),
          rgba(27, 127, 121, 0.16) calc(var(--hour-w) - 1px),
          rgba(27, 127, 121, 0.16) var(--hour-w)
        );
    }

    .day-head.today {
      color: var(--accent-dark);
    }

    .day-head.daily,
    .timeline-row.daily {
      background:
        repeating-linear-gradient(
          to right,
          rgba(73, 105, 168, 0.1) 0,
          rgba(73, 105, 168, 0.1) calc(var(--hour-w) - 1px),
          rgba(73, 105, 168, 0.18) calc(var(--hour-w) - 1px),
          rgba(73, 105, 168, 0.18) var(--hour-w)
        );
    }

    .day-head.daily {
      color: #344d86;
    }

    .event {
      position: absolute;
      top: var(--row-pad);
      height: 50px;
      border-radius: 7px;
      color: #fff;
      padding: 9px 11px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.14);
      overflow: hidden;
      cursor: pointer;
      outline: 1px solid rgba(255, 255, 255, 0.22);
      min-width: 0;
      touch-action: none;
    }

    .event.moving {
      opacity: 0.86;
      cursor: grabbing;
    }

    .event:hover, .event.selected {
      outline: 2px solid var(--danger);
      outline-offset: 2px;
    }

    .event-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 750;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-time {
      display: block;
      margin-top: 5px;
      font-size: 11px;
      line-height: 1.2;
      opacity: 0.92;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event.compact {
      padding: 7px 8px;
    }

    .event.micro {
      padding: 0;
      border-radius: 4px;
    }

    .event.micro .event-title,
    .event.micro .event-time {
      display: none;
    }

    .event.compact .event-time,
    .event.dense .event-time {
      display: none;
    }

    .event.dense {
      padding: 5px 8px;
      border-radius: 6px;
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.12);
    }

    .event.dense .event-title {
      font-size: 11px;
    }

    .daily-ghost-event {
      position: absolute;
      height: 11px;
      border: 1px dashed rgba(93, 105, 121, 0.58);
      border-radius: 999px;
      background: rgba(107, 119, 136, 0.11);
      box-shadow: none;
      pointer-events: none;
      z-index: 0;
    }

    .daily-ghost-event::after {
      content: "매일";
      position: absolute;
      left: 7px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(78, 91, 108, 0.86);
      font-size: 9px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
      opacity: 0;
    }

    .daily-ghost-event.wide::after {
      opacity: 1;
    }

    .overflow-badge {
      min-width: 34px;
      height: 20px;
      padding: 0 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 750;
      box-shadow: 0 4px 10px rgba(23, 32, 42, 0.1);
      cursor: pointer;
      margin-top: 2px;
    }

    .overflow-badge:hover {
      border-color: var(--accent);
      color: var(--accent-dark);
    }

    .overflow-list {
      padding: 14px;
      display: grid;
      gap: 8px;
      align-content: start;
      overflow: auto;
    }

    .overflow-item {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 4px;
      text-align: left;
      cursor: pointer;
    }

    .overflow-item:hover {
      border-color: var(--accent);
    }

    .overflow-item.dragging {
      opacity: 0.55;
    }

    .overflow-item strong {
      font-size: 13px;
    }

    .overflow-item span {
      color: var(--muted);
      font-size: 12px;
    }

    .overflow-item .hidden-tag {
      color: var(--danger);
      font-weight: 750;
    }

    .handle {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 14px;
      cursor: ew-resize;
      z-index: 2;
    }

    .handle.left { left: 0; }
    .handle.right { right: 0; }

    .event.resize-left,
    .event.resize-right {
      cursor: ew-resize;
    }

    .draft {
      position: absolute;
      top: var(--row-pad);
      height: 50px;
      border: 2px dashed var(--accent);
      background: rgba(27, 127, 121, 0.12);
      border-radius: 7px;
      pointer-events: none;
    }

    .context-menu {
      position: fixed;
      z-index: 200;
      min-width: 132px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      box-shadow: 0 12px 28px rgba(23, 32, 42, 0.16);
      display: none;
    }

    .context-menu.open {
      display: grid;
      gap: 2px;
    }

    .context-menu button {
      height: 32px;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      padding: 0 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 650;
    }

    .context-menu button:hover {
      background: #f2f5f9;
    }

    .context-menu button[hidden] {
      display: none;
    }

    .context-menu button:disabled {
      color: #a7b0bc;
      cursor: not-allowed;
    }

    .context-menu button:disabled:hover {
      background: transparent;
    }

    .context-menu button.danger {
      color: var(--danger);
    }

    .side-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(390px, calc(100vw - 24px));
      background: var(--panel);
      border-left: 1px solid var(--line);
      box-shadow: -16px 0 34px rgba(23, 32, 42, 0.14);
      transform: translateX(102%);
      transition: transform 180ms ease;
      z-index: 100;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .side-panel.open { transform: translateX(0); }

    .trash-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(430px, calc(100vw - 24px));
      background: var(--panel);
      border-left: 1px solid var(--line);
      box-shadow: -16px 0 34px rgba(23, 32, 42, 0.14);
      transform: translateX(102%);
      transition: transform 180ms ease;
      z-index: 110;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .trash-panel.open { transform: translateX(0); }

    .panel-head, .panel-foot {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-foot { border-top: 1px solid var(--line); border-bottom: 0; justify-content: flex-end; }
    .panel-head h2 { margin: 0; font-size: 17px; letter-spacing: 0; }

    .panel-body {
      padding: 16px;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .form-field { display: grid; gap: 7px; }
    .form-field label { color: var(--muted); font-size: 12px; font-weight: 750; }
    .form-field input, .form-field select { width: 100%; min-width: 0; }
    .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .repeat-sentence {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--ink);
      font-size: 14px;
      font-weight: 750;
    }

    .repeat-sentence input {
      width: 86px;
    }

    .repeat-group-list {
      display: grid;
      gap: 8px;
    }

    .repeat-group-item {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .repeat-group-item strong {
      display: block;
      font-size: 13px;
    }

    .repeat-group-item span {
      color: var(--muted);
      font-size: 12px;
    }

    .inline-add-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .day-checks {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .day-checks label {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 750;
    }

    .day-checks input {
      width: 13px;
      height: 13px;
      accent-color: var(--accent);
    }

    .empty-state {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      padding: 14px;
      border: 1px solid var(--line-soft);
      border-radius: 7px;
      background: #fbfcfe;
    }

    .kbd {
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--muted);
      border-radius: 5px;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 650;
    }

    .trash-list {
      padding: 14px;
      display: grid;
      gap: 8px;
      align-content: start;
      overflow: auto;
    }

    .trash-item {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      display: grid;
      gap: 8px;
      background: #fff;
    }

    .trash-item strong {
      font-size: 13px;
    }

    .trash-item span {
      color: var(--muted);
      font-size: 12px;
    }

    .trash-item-actions {
      display: flex;
      justify-content: flex-end;
    }

    .platform-list {
      display: grid;
      gap: 6px;
    }

    .platform-item {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px;
      display: grid;
      gap: 6px;
      background: #fff;
    }

    .platform-row {
      display: grid;
      grid-template-columns: 1fr 38px;
      gap: 8px;
      align-items: center;
    }

    .color-input {
      width: 38px;
      min-width: 38px;
      height: 32px;
      padding: 3px;
    }

    .platform-presets summary {
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      list-style: none;
    }

    .platform-presets summary::-webkit-details-marker {
      display: none;
    }

    .swatches {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding-top: 6px;
    }

    .swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: var(--swatch);
      cursor: pointer;
    }

    .swatch.selected {
      border-color: var(--ink);
    }

    .platform-add-row {
      display: grid;
      grid-template-columns: 1fr 38px auto;
      gap: 8px;
      align-items: end;
    }

    svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 820px) {
      :root {
        --day-w: 70px;
        --hour-w: 132px;
        --row-h: 88px;
      }

      .topbar, .toolbar {
        padding-left: 14px;
        padding-right: 14px;
      }

      .topbar, .toolbar {
        display: grid;
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .actions, .legend, .platform-tools { justify-content: flex-start; }
      .scheduler-shell { padding: 12px 14px 16px; }
      .scroll-hint { top: 12px; bottom: 16px; }
      .scroll-hint.left { left: calc(14px + var(--day-w)); }
      .scroll-hint.right { right: 14px; }
      .live-strip { margin: 12px 14px 0; }
      .scheduler { height: calc(100vh - 230px); }
      input[type="text"] { width: min(100%, 320px); }
      .help-tooltip { width: min(78vw, 340px); }
      .day-head { padding: 0 10px; }
      .day-head strong { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title">
        <h1>
          <span class="help-wrap">
            <button class="help-btn" type="button" aria-label="사용 방법">?</button>

              더블클릭으로 생성, 드래그로 시간 이동, 좌우 가장자리로 시간 조정, 우클릭으로 편집/삭제합니다.

  <aside class="side-panel" id="sidePanel" aria-label="스케줄 편집">

  <aside class="trash-panel" id="trashPanel" aria-label="휴지통">
    <div class="panel-head">
